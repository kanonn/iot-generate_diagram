<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Fontconfig Font Substitution Configuration
  
  Location: /etc/fonts/conf.d/99-ms-fonts-substitution.conf
  
  This provides system-level font substitution for applications
  that use fontconfig (including LibreOffice).
  
  After copying, run: fc-cache -fv
-->
<fontconfig>

  <!-- MS Gothic family -> Noto Sans CJK JP -->
  <match target="pattern">
    <test qual="any" name="family"><string>MS Gothic</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>MS PGothic</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>MS UI Gothic</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>ＭＳ ゴシック</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>ＭＳ Ｐゴシック</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <!-- MS Mincho family -> Noto Serif CJK JP -->
  <match target="pattern">
    <test qual="any" name="family"><string>MS Mincho</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>MS PMincho</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>ＭＳ 明朝</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>ＭＳ Ｐ明朝</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>
  
  <!-- Meiryo -> Noto Sans CJK JP -->
  <match target="pattern">
    <test qual="any" name="family"><string>Meiryo</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>Meiryo UI</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>メイリオ</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <!-- Yu Gothic -> Noto Sans CJK JP -->
  <match target="pattern">
    <test qual="any" name="family"><string>Yu Gothic</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>Yu Gothic UI</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>游ゴシック</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <!-- Yu Mincho -> Noto Serif CJK JP -->
  <match target="pattern">
    <test qual="any" name="family"><string>Yu Mincho</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>游明朝</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>
  
  <!-- HG fonts -->
  <match target="pattern">
    <test qual="any" name="family"><string>HGGothicB</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>HGPGothicB</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>HGSGothicB</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>HGMinchoB</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>HGPMinchoB</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>
  
  <!-- SimSun (Chinese) -> Noto Sans CJK SC -->
  <match target="pattern">
    <test qual="any" name="family"><string>SimSun</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test qual="any" name="family"><string>宋体</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>
  
  <!-- Arial -> DejaVu Sans -->
  <match target="pattern">
    <test qual="any" name="family"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>DejaVu Sans</string>
    </edit>
  </match>
  
  <!-- Times New Roman -> DejaVu Serif -->
  <match target="pattern">
    <test qual="any" name="family"><string>Times New Roman</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>DejaVu Serif</string>
    </edit>
  </match>
  
  <!-- Calibri -> DejaVu Sans -->
  <match target="pattern">
    <test qual="any" name="family"><string>Calibri</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>DejaVu Sans</string>
    </edit>
  </match>
  
  <!-- Cambria -> DejaVu Serif -->
  <match target="pattern">
    <test qual="any" name="family"><string>Cambria</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>DejaVu Serif</string>
    </edit>
  </match>

</fontconfig>
